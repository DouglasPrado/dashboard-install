name: release

# Build, scan and publish the distribution image to GHCR (dashboard-install repo).
# Source is fetched from the private dashboard repo.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish (e.g. v0.2.0 or latest)
        required: true
        default: latest
  repository_dispatch:
    types: [build-from-dashboard]

permissions:
  contents: read
  packages: write

env:
  # Published under dashboard-install (public repo), but built from dashboard (private)
  IMAGE: ghcr.io/douglasprado/dashboard-install
  DASHBOARD_REPO: DouglasPrado/dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard-install (for config)
        uses: actions/checkout@v4
        with:
          path: dashboard-install

      - name: Checkout dashboard (private, for source)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DASHBOARD_REPO }}
          token: ${{ secrets.DASHBOARD_REPO_TOKEN }} # PAT with repo access to dashboard
          path: dashboard

      - name: Resolve tags and image
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              version="${GITHUB_REF_NAME}"   # vX.Y.Z (or vX.Y.Z-rc.N) git tag → a release
            else
              version="edge"                 # non-tag push (unreachable: trigger is tags only)
            fi
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Forwarded from the dashboard repo. A vX.Y.Z tag push carries that
            # version in the payload (→ a real release); a plain main push omits
            # it and falls back to the rolling `edge` preview.
            version="${{ github.event.client_payload.version }}"
            version="${version:-edge}"
          else
            version="${{ github.event.inputs.tag }}"
          fi
          # Clean version (no leading v) for the image's OCI version label / build-arg,
          # so it matches package.json and the app's reported VERSION.
          clean="${version#v}"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "version=$clean" >> "$GITHUB_OUTPUT"
          # Publish the immutable version tag, plus a moving pointer:
          #   * stable semver (vX.Y.Z) → also move :latest (the update-check target)
          #   * per-commit edge build (edge-<sha>) → also move :edge (rolling preview)
          # Skip the pointer for pre-releases (vX.Y.Z-rc.N), the bare `edge`/`latest`
          # inputs, and any other dashed version. Each main commit thus publishes a
          # unique, immutable edge-<sha> ref AND advances :edge to it.
          {
            echo "tags<<EOF"
            echo "$IMAGE:$version"
            case "$version" in
              edge-*)          echo "$IMAGE:edge" ;;
              latest|edge|*-*) ;;
              *)               echo "$IMAGE:latest" ;;
            esac
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build → load locally → guard → scan → push. The guard and scan run on
      # the local image BEFORE publication, so a bad image never reaches GHCR.
      # (push happens in a separate step below; buildx caches the layers, so the
      # second build is a near-instant cache hit on the same bytes.)
      - name: Build image (load locally, do not publish yet)
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: false
          load: true
          tags: dashboard-install:guard
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      # Fail the release if the image leaks source/sourcemap artifacts (the
      # MINIFY+STRIP invariant). Inspect the exported filesystem from the runner
      # rather than `find` inside — the runtime stage may be distroless (no
      # shell). The banned-artifact contract lives in ci/check-image-artifacts.sh
      # (unit-tested by test/image-guard.test.sh).
      - name: Guard — no source/sourcemap artifacts in image
        run: |
          set -euo pipefail
          cid="$(docker create dashboard-install:guard)"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker export "$cid" | tar -t > /tmp/img-files.txt
          bash dashboard-install/ci/check-image-artifacts.sh < /tmp/img-files.txt

      - name: Guard — required runtime artifacts present in image
        run: bash dashboard-install/ci/check-required-artifacts.sh < /tmp/img-files.txt

      - name: Scan image with Trivy (vuln + secret, pre-publish)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dashboard-install:guard
          scanners: vuln,secret
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true

      - name: Report digest
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Pin DASHBOARD_IMAGE to the digest above in compose.prod.yml." >> "$GITHUB_STEP_SUMMARY"