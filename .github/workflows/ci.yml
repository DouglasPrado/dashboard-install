name: ci

# Run the bash test suite (installer units + compose contract/hardening guards)
# on every PR and on pushes to main. Previously nothing ran test/*.test.sh.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run bash test suite
        run: |
          set -euo pipefail
          rc=0
          for t in test/*.test.sh; do
            echo "── $t"
            bash "$t" || rc=1
          done
          exit "$rc"
