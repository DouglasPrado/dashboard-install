# Distribution compose — pulls the published image (no source on the client
# host). The installer writes .env and pins DASHBOARD_IMAGE to a digest.
# Dev keeps using compose.yml (build: .).
services:
  app:
    image: ${DASHBOARD_IMAGE:-ghcr.io/douglasprado/dashboard-install:latest}
    container_name: dashboard-app
    restart: unless-stopped
    # Run as the host executor (claude-bots) instead of root so every file the
    # dashboard writes into the shared binds (/claude, /data) is owned by the
    # same uid that runs the agent CLI over SSH. Root-owned writes otherwise
    # block the executor with EACCES — empty Consumo tab and failed agent runs —
    # and cap_drop:ALL (below) removes CAP_CHOWN, so the in-process chown-back
    # fallback can't repair ownership. install.sh captures these into .env.
    #
    # Fail closed: this container mounts the Docker socket (root-equivalent on
    # the host), so silently falling back to uid 0 when .env is absent is a
    # privilege-escalation foot-gun — a bare `docker compose up` with no .env
    # would run the socket-bearing container as root. ${VAR:?} makes compose
    # abort with a clear message instead. Always go through install.sh.
    user: "${EXECUTOR_UID:?run via install.sh (writes EXECUTOR_UID to .env); refusing to start the docker.sock-mounted container as root}:${EXECUTOR_GID:?run via install.sh (writes EXECUTOR_GID to .env)}"
    group_add:
      # docker.sock is root:docker on the host; a non-root uid needs the host's
      # numeric docker gid to talk to the daemon. Defaults to root's group (0).
      - "${DOCKER_GID:-0}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      # Secure defaults for distribution. Every API route is gated behind a
      # license-key session, so boot is safe without a password/proxy.
      # DASHBOARD_PASSWORD / TRUST_PROXY_AUTH (in .env) only add an operator
      # identity for admin-role authz.
      - LICENSE_ENFORCE=true
      # Agent executor: the dashboard SSHes into the host to run `claude` as the
      # executor user (provisioned by install.sh). These match ssh-exec.ts
      # defaults; set explicitly so the contract is visible. EXECUTOR_USER is
      # parametrized so the macOS installer can point it at the admin user that
      # owns Docker Desktop's socket; the default keeps the Linux claude-bots
      # contract (install-macos.sh writes EXECUTOR_USER to .env).
      - SSH_HOST=host.docker.internal
      - SSH_USER=${EXECUTOR_USER:-claude-bots}
      # Pin the license file under /data (matches the ./data:/data mount).
      # Required for older images whose default still resolves via process.cwd().
      - LICENSE_FILE=/data/license.key
    volumes:
      - ./data:/data
      - /root/workspace:/workspace
      # Executor home — server/claude.ts reads transcripts, plans, sessions,
      # history and settings from /claude/* (mapped to the executor's ~/.claude).
      # Without this bind, the chat panel renders empty even after `claude /login`.
      # EXECUTOR_CLAUDE_DIR is parametrized so the macOS installer can mount the
      # admin user's ~/.claude; the default keeps the Linux claude-bots path.
      - ${EXECUTOR_CLAUDE_DIR:-/home/claude-bots/.claude}:/claude
      # Docker socket — load-bearing: the dashboard reads it to list/manage
      # containers (docker.ts, docker-logs.ts), exec (docker-exec.ts) and run
      # the security scanners in throwaway containers (security/docker-runner.ts).
      #
      # SECURITY (be honest, not theater): the `:ro` flag makes only the socket
      # INODE read-only — it does NOT restrict the Docker API. Anyone who can
      # talk to this socket can `POST /containers/create` with a host-root bind
      # and Privileged:true, i.e. take over the daemon = root on the host. A
      # socket-proxy would not help: the app legitimately needs create+exec, so
      # the proxy would have to allow exactly the dangerous verbs. Treat this
      # container as a privileged host orchestrator. Blast radius is the
      # operator's OWN host (they already are root there); the runtime hardening
      # above limits damage from a compromised *dependency/agent*, not from this
      # intended, authenticated access.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # On Linux, host.docker.internal isn't resolvable by default; map it to the
    # host gateway so the container can SSH back to the host executor.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Publish the API/SPA port to the host LOOPBACK only — a second, local-only
    # door for a host-side reverse proxy or local debugging, without exposing it
    # on a public NIC. The --tailscale flow does NOT use this (Traefik routes the
    # tailnet IP); it stays for optional host-local proxies. Never bind 0.0.0.0.
    ports:
      - "127.0.0.1:3001:3001"
    security_opt:
      - no-new-privileges:true
    # Runtime least-privilege (defense-in-depth). Limits blast radius if the
    # process is compromised (dependency RCE, an agent escaping, prompt-injection
    # escalation); it does NOT stop a root-on-host operator from extracting the
    # image. read-only rootfs is safe because the app writes only under /data
    # (the bind above: SQLite, license.key, ssh key) and /tmp (tmpfs below).
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 512
    # Liveness for unattended remote installs. Probes the ungated /api/health
    # with node's global fetch (no curl/wget needed — survives read_only +
    # cap_drop:ALL). NOTE: `restart: unless-stopped` does NOT act on health, so
    # this gives observability (docker ps + the dashboard's own container panel,
    # which reads the /(unhealthy)/ status) — not auto-restart. Opt into the
    # `autoheal` service below to restart this container when it goes unhealthy:
    #   docker compose -f compose.prod.yml --profile autoheal up -d
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - stack_web
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST:?set DASHBOARD_HOST}`)
      - traefik.http.routers.dashboard.entrypoints=web
      # O server de produção serve SPA + API na mesma porta (3001); sem vite.
      - traefik.http.services.dashboard.loadbalancer.server.port=3001
      # Marks this container for the opt-in autoheal watcher (below).
      - autoheal=true

  # Opt-in auto-restart for the app when its healthcheck goes unhealthy. OFF by
  # default (profile-gated): enable with `--profile autoheal`. It only restarts
  # containers labelled autoheal=true. SECURITY: like the app, it mounts the
  # Docker socket (RW — it must POST /restart), so it is privileged host access.
  # Don't enable it unless you accept a second socket-bearing container.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: dashboard-autoheal
    profiles: ["autoheal"]
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true

networks:
  stack_web:
    external: true
